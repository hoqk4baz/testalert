name: Build Device Spoofer Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone fishhook
        run: |
          git clone https://github.com/facebook/fishhook.git
          cp fishhook/fishhook.c .
          cp fishhook/fishhook.h .

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          
          clang \
            -arch arm64 \
            -shared \
            -fobjc-arc \
            -isysroot "$SDK" \
            -framework UIKit \
            -framework Foundation \
            -framework Security \
            -Xlinker -install_name \
            -Xlinker @executable_path/Frameworks/device_spoofer.dylib \
            fishhook.c \
            Tweak.m \
            -o device_spoofer.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: device_spoofer
          path: device_spoofer.dylib
