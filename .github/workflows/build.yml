name: Build DeviceSpoofer

on:
  push:
    branches: [ main, master ]
  pull_request:
  release:
    types: [ created ]

jobs:
  build:
    name: Build Theos Tweak
    runs-on: macos-latest   # veya ubuntu-latest (Linux runner da destekliyor)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Theos (with cache)
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: '${{ github.workspace }}/theos'
          cache: true

      # Opsiyonel: Daha yeni SDK istiyorsan (iOS 18+ vs.)
      # - name: Download custom SDK
      #   run: |
      #     mkdir -p $THEOS/sdks
      #     cd $THEOS/sdks
      #     curl -LO https://github.com/theos/sdks/releases/download/18.0/iPhoneOS18.0.sdk.tar.xz
      #     tar -xf iPhoneOS18.0.sdk.tar.xz

      - name: Build Package
        run: |
          export THEOS="${{ github.workspace }}/theos"
          make package FINALPACKAGE=1

      - name: Upload DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeviceSpoofer-Deb
          path: packages/*.deb
          retention-days: 30

      - name: Upload dylib (raw)
        uses: actions/upload-artifact@v4
        with:
          name: DeviceSpoofer-dylib
          path: |
            obj/*.dylib
            obj/Tweak.dylib
          retention-days: 7
