name: Build IDFV Spoofer Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          
          clang \
            -arch arm64 \
            -shared \
            -fmodules \
            -fobjc-arc \
            -isysroot "$SDK" \
            -framework UIKit \
            -framework Foundation \
            -Xlinker -install_name \
            -Xlinker @executable_path/Frameworks/idfv_spoofer.dylib \
            -o idfv_spoofer.dylib \
            Tweak.m

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: idfv_spoofer
          path: idfv_spoofer.dylib
